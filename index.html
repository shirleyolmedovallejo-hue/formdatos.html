<!DOCTYPE html>
<html>
<head>
<title>Formulario</title>
</head>

<body>

<form action="" method="post">

<table>

<tr>
<td>Nombres:</td>
<td><input type="text" name="nombres"></td>
</tr>

<tr>
<td>Número de cédula:</td>
<td><input type="number" name="cedula"></td>
</tr>

<tr>
<td>Fecha de nacimiento:</td>
<td><input type="date" name="fecha"></td>
</tr>

<tr>
<td>Ciudad:</td>
<td><input type="text" name="ciudad"></td>
</tr>

<tr>
<td>Correo:</td>
<td><input type="email" name="correo"></td>
</tr>

<tr>
<td>Teléfono:</td>
<td><input type="number" name="telefono"></td>
</tr>

<tr>
<td>Dirección:</td>
<td><textarea name="direccion" cols="30" rows="3"></textarea></td>
</tr>

<tr>
<td>Estado civil:</td>
<td>
<select name="estado">
<option>Seleccione...</option>
<option>Soltero</option>
<option>Casado</option>
<option>Divorciado</option>
<option>Viudo</option>
</select>
</td>
</tr>

<tr>
<td>Etnia:</td>
<td>
<select name="etnia">
<option>Seleccione...</option>
<option>Mestizo</option>
<option>Afroecuatoriano</option>
<option>Indígena</option>
<option>Montubio</option>
<option>Blanco</option>
</select>
</td>
</tr>

<tr>
<td>Género:</td>
<td>
<input type="radio" name="genero"> Masculino
<input type="radio" name="genero"> Femenino
<input type="radio" name="genero"> Otro
</td>
</tr>

<tr>
<td>Gustos personales:</td>
<td>
<input type="checkbox"> Deportes
<input type="checkbox"> Música
<input type="checkbox"> Lectura
<input type="checkbox"> Cine
<input type="checkbox"> Otros
</td>
</tr>

<tr>
<td></td>
<td>
<input type="submit" value="Enviar">
<input type="reset" value="Limpiar">
</td>
</tr>

</table>

</form>

</body>
</html>
